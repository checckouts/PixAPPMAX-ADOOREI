services:
  - type: web
    name: checkout-proxy
    env: docker
    plan: standard
    envVars:
      - key: PORT
        value: 5000
      - key: PYTHONUNBUFFERED
        value: 1
      - key: LOG_LEVEL
        value: INFO

    # Health check
    healthCheckPath: /health
    healthCheckInterval: 30

    # Timeout adequado para geração de PIX
    timeout: 30
